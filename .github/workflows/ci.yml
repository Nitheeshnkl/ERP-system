name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ERP backend/erp-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ERP backend/erp-backend/package-lock.json
      - name: Install backend deps
        run: npm ci
      - name: Run backend tests
        run: npm test -- --runInBand

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ ERP frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: npm install
      - name: Type-check frontend
        run: npm run type-check
      - name: Build frontend
        run: npm run build
