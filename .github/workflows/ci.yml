name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ERP backend/erp-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: ERP backend/erp-backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ ERP frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path:  ERP frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test

      - name: Run frontend type-check
        run: npm run type-check

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t erp-backend-test "./ERP backend/erp-backend"

      - name: Build frontend image
        run: docker build -t erp-frontend-test "./ ERP frontend"
