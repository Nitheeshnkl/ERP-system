version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: erp-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - erp-network

  backend:
    build:
      context: ./ERP backend/erp-backend
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    env_file:
      - ./ERP backend/erp-backend/.env
    environment:
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/erp}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      - mongo
    ports:
      - "${BACKEND_PORT:-18000}:5000"
    networks:
      - erp-network

  frontend:
    build:
      context: ./ ERP frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - erp-network

volumes:
  mongo_data:

networks:
  erp-network:
    driver: bridge
