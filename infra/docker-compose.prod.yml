version: '3.9'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: erp-backend-prod
    env_file:
      - ../backend/.env.example
    environment:
      NODE_ENV: production
      ENABLE_SOCKET_IO: "false"
      PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: node:20-alpine
    container_name: erp-frontend-prod
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy
